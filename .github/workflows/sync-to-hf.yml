name: Sync to Hugging Face Space
on:
  push:
    branches: [main]          # adjust if needed
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout the repo (full history, LFS enabled)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 2️⃣ Set up Git config – required for the push
      - name: Set up Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      # 3️⃣ Push the current commit to the Hugging Face Space via HTTPS
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Build the remote URL that includes the token for authentication
          HF_REPO="<YOUR_HF_USERNAME>/H1-Test"
          REMOTE_URL="https://${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${HF_REPO}"
          # Add the remote (overwrites if it already exists)
          git remote add hf "${REMOTE_URL}" || git remote set-url hf "${REMOTE_URL}"
          # Force‑push the current branch to the remote Space repo
          git push -f hf HEAD:main
